<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №4</title>
    
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container my-4 d-grid gap-3">
        
        <div class="row">
            <div class="col-12 col-md-4 mb-2 mb-md-0">
                <div class="custom-block block-1">Ряд 1: Блок 1.1</div>
            </div>
            <div class="col-12 col-md-4">
                <div class="custom-block block-1">Ряд 1: Блок 1.2</div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-md-4 d-none d-md-block mb-2 mb-md-0">
                <div class="custom-block block-2">Блок 2.1 (Непарний)</div>
            </div>
            <div class="col-12 col-md-4 mb-2 mb-md-0">
                <div class="custom-block block-2">Блок 2.2 (Парний)</div>
            </div>
            <div class="col-12 col-md-4 d-none d-md-block">
                <div class="custom-block block-2">Блок 2.3 (Непарний)</div>
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <div class="custom-block block-3">Блок 3.1 (50%)</div>
            </div>
            
            <div class="col-3 d-none d-sm-block">
                <div class="custom-block block-3">Блок 3.2</div>
            </div>
            
            <div class="col-3 offset-3 offset-sm-0">
                <div class="custom-block block-3">Блок 3.3</div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="custom-block block-4">Ряд 4: Один блок</div>
            </div>
        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
